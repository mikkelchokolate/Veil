name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: make build
      - run: go test ./... -count=1
      - run: git diff --check

  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            label: linux/amd64
          - goos: linux
            goarch: arm64
            label: linux/arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o dist/veil ./cmd/veil
          tar -C dist -czf "dist/veil_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" veil
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: veil-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/veil_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: [quality, release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum veil_linux_amd64.tar.gz veil_linux_arm64.tar.gz > checksums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Veil ${GITHUB_REF_NAME}" \
            --notes "Automated Veil release with Linux amd64/arm64 archives and checksums."
